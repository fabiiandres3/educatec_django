{% extends 'base.html' %}

{% block title %}Tareas{% endblock %}

{% block content %}
<h1>Eliminar Tarea</h1>
<p>¿Estás seguro de que quieres eliminar la tarea "{{ tarea.titulo }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Eliminar</button>
    <a href="{% url 'listar_tareas' %}">Cancelar</a>
</form>
{% endblock %}
