{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="container">
    <h2>Reproductor de YouTube</h2>

    <form method="post">
        {% csrf_token %}
        {{ form }}

        <button class="btn btn-primary mt-2" type="submit">Cargar</button>
    </form>

    <div class="mt-3">
        {% if video_id %}
        <iframe width="400px" height="400px" src="https://www.youtube.com/embed/{{ video_id }}"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
        </iframe>
        {% endif %}
    </div>
</div>

<script src="{% static 'js/reprodutor.js' %}"></script>

{% endblock %}
