{% extends 'base.html' %}

{% load static %}
{% block content %}

<div class="container">
    <h2>Reproductor de YouTube</h2>

    <form method="post">
        {% csrf_token %}
        {{ UrlForm.as_p }}

        <button class="btn btn-primary mt-2" type="submit">Cargar</button>
    </form>

    <div class="mt-3">
        {% if video_id %}
        <iframe width="100%" height="500" src="https://www.youtube.com/embed/{{ video_id }}" allowfullscreen>
        </iframe>
        {% endif %}
    </div>
</div>

<script src="{% static 'js/reprodutor.js' %}"></script>

{% endblock %}
