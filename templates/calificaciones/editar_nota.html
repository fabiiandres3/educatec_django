{% extends 'calificaciones/base.html' %}

{% block title %}Editar Nota{% endblock %}
{% block active_calificaciones %}active{% endblock %}

{% block content %}

<div class="section-card" style="max-width: 600px; margin: 0 auto;">
    <h4 style="margin-bottom:20px;">Editar Nota</h4>
    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom:15px;">
            <label style="font-size:13px; color:#6b7280; margin-bottom:5px; display:block;">Estudiante</label>
            {{ form.estudiante }}
        </div>
        <div style="margin-bottom:15px;">
            <label style="font-size:13px; color:#6b7280; margin-bottom:5px; display:block;">Materia</label>
            {{ form.materia }}
        </div>
        <div style="margin-bottom:20px;">
            <label style="font-size:13px; color:#6b7280; margin-bottom:5px; display:block;">Calificación</label>
            {{ form.calificacion }}
        </div>
        <div style="display:flex; gap:10px;">
            <button type="submit" class="btn-save">Actualizar Nota</button>
            <a href="{% url 'calificaciones_docente' %}" 
               style="background:#f3f4f6; color:#081b3a; border:none; padding:12px 20px; border-radius:10px; text-decoration:none; display:inline-block;">
               Cancelar
            </a>
        </div>
    </form>
</div>

{% endblock %}
